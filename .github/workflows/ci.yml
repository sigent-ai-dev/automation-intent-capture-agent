name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - run: uv run pytest tests/unit/ -v --tb=short
        name: Run unit tests

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run pytest tests/integration/ -v --tb=short
        name: Run integration tests

  smoke-test:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t voice-server:test .
      - name: Start container
        run: |
          docker run -d --name voice-server -p 8080:8080 \
            -e LOCAL_MODE=true \
            voice-server:test
          sleep 3
      - name: Smoke test — health endpoints
        run: |
          curl -f http://localhost:8080/health/live | grep -q '"alive"'
          curl -f http://localhost:8080/health/ready | grep -q '"ready"'
      - name: Smoke test — WebSocket connection
        run: |
          uv tool install websockets
          python3 -c "
          import asyncio, json, websockets

          async def test():
              async with websockets.connect('ws://localhost:8080/ws/audio') as ws:
                  await ws.send(json.dumps({
                      'type': 'codec_negotiate',
                      'codec': 'pcm',
                      'sample_rate': 16000,
                      'bit_depth': 16,
                      'channels': 1,
                  }))
                  ack = json.loads(await ws.recv())
                  assert ack['type'] == 'codec_ack', f'Expected codec_ack, got {ack}'
                  ready = json.loads(await ws.recv())
                  assert ready['type'] == 'session_ready', f'Expected session_ready, got {ready}'
                  print('Smoke test passed: WebSocket connection + codec negotiation OK')

          asyncio.run(test())
          "
      - name: Stop container
        if: always()
        run: docker stop voice-server && docker rm voice-server

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
