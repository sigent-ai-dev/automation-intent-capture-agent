name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short
      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv build
      - name: Docker build + smoke test
        run: |
          docker build -t voice-server:test .
          docker run -d --name voice-server -p 8080:8080 -e LOCAL_MODE=true voice-server:test
          sleep 3
          curl -f http://localhost:8080/health/live | grep -q '"alive"'
          curl -f http://localhost:8080/health/ready | grep -q '"ready"'
          docker stop voice-server && docker rm voice-server
