name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short
      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short

  smoke-test:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build Docker image
        run: docker build -t voice-server:test .
      - name: Start container
        run: |
          docker run -d --name voice-server -p 8080:8080 -e LOCAL_MODE=true voice-server:test
          sleep 3
      - name: Health endpoint smoke
        run: |
          curl -f http://localhost:8080/health/live | grep -q '"alive"'
          curl -f http://localhost:8080/health/ready | grep -q '"ready"'
      - name: WebSocket handshake smoke
        run: |
          uv run python -c "
          import asyncio, json, websockets

          async def test():
              async with websockets.connect('ws://localhost:8080/ws/audio') as ws:
                  await ws.send(json.dumps({
                      'type': 'codec_negotiate',
                      'codec': 'pcm',
                      'sample_rate': 16000,
                      'bit_depth': 16,
                      'channels': 1,
                  }))
                  ack = json.loads(await ws.recv())
                  assert ack['type'] == 'codec_ack', f'Expected codec_ack, got {ack}'
                  ready = json.loads(await ws.recv())
                  assert ready['type'] == 'session_ready', f'Expected session_ready, got {ready}'
                  print('PASS: WebSocket connection + codec negotiation')

          asyncio.run(test())
          "
      - name: Stop container
        if: always()
        run: docker stop voice-server && docker rm voice-server || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npx vite build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests (headless Chromium)
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/test-results/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
