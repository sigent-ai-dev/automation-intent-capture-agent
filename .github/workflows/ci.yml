name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UV_VERSION: "latest"

jobs:
  pre_commit:
    name: "Pre-commit Checks"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Format check with ruff
        run: uv run ruff format --check src/ tests/

  unit_tests:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    needs: pre_commit
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ \
            -v --tb=short \
            --junitxml=reports/unit-test-results.xml \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: reports/

      - name: Test Report Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests (Python ${{ matrix.python-version }})
          path: reports/unit-test-results.xml
          reporter: java-junit
          fail-on-error: true

  integration_tests:
    name: "Integration Tests"
    runs-on: ubuntu-24.04
    needs: unit_tests
    concurrency:
      group: integration-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -v --tb=short \
            --junitxml=reports/integration-test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/

      - name: Test Report Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Tests
          path: reports/integration-test-results.xml
          reporter: java-junit
          fail-on-error: true

  smoke_test:
    name: "Docker Smoke Test"
    runs-on: ubuntu-24.04
    needs: integration_tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build Docker image
        run: docker build -t voice-server:test .

      - name: Start container
        run: |
          docker run -d --name voice-server -p 8080:8080 -e LOCAL_MODE=true voice-server:test
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/health/live && break
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: Health endpoint smoke
        run: |
          curl -f http://localhost:8080/health/live | grep -q '"alive"'
          curl -f http://localhost:8080/health/ready | grep -q '"ready"'

      - name: WebSocket handshake smoke
        run: |
          uv sync --group dev
          uv run python -c "
          import asyncio, json, websockets

          async def test():
              async with websockets.connect('ws://localhost:8080/ws/audio') as ws:
                  await ws.send(json.dumps({
                      'type': 'codec_negotiate',
                      'codec': 'pcm',
                      'sample_rate': 16000,
                      'bit_depth': 16,
                      'channels': 1,
                  }))
                  ack = json.loads(await ws.recv())
                  assert ack['type'] == 'codec_ack', f'Expected codec_ack, got {ack}'
                  ready = json.loads(await ws.recv())
                  assert ready['type'] == 'session_ready', f'Expected session_ready, got {ready}'
                  print('PASS: WebSocket connection + codec negotiation')

          asyncio.run(test())
          "

      - name: Stop container
        if: always()
        run: docker stop voice-server && docker rm voice-server || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npx vite build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests (headless Chromium)
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/test-results/

  build:
    name: "Build Package"
    runs-on: ubuntu-24.04
    needs: pre_commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build distribution
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  terraform-plan:
    name: "Terraform Plan (Dev)"
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Export environment
        uses: cardinalby/export-env-action@v2
        with:
          envFile: .github/configs/Dev.env
      - uses: ./.github/actions/setup-intent-capture
        with:
          aws_role_arn: ${{ env.AWS_OIDC_ROLE }}
          aws_region: ${{ env.AWS_REGION }}
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Terraform format check
        run: terraform fmt -recursive -check terraform/
      - uses: ./.github/actions/terraform-run
        with:
          action: plan
          backend_config: environments/dev.backend.hcl
          var_file: environments/dev.tfvars
