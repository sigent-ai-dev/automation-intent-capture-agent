name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "Dev"
        type: choice
        options:
          - Dev

concurrency:
  group: intent-capture-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment || 'Dev' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Export environment
        uses: cardinalby/export-env-action@v2
        with:
          envFile: .github/configs/${{ inputs.environment || 'Dev' }}.env

      - uses: ./.github/actions/setup-intent-capture
        with:
          aws_role_arn: ${{ env.AWS_OIDC_ROLE }}
          aws_region: ${{ env.AWS_REGION }}
          terraform_version: ""

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG=${{ steps.meta.outputs.image_tag }}
          docker build --platform linux/amd64 -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-24.04
    needs: build-and-push
    environment: ${{ inputs.environment || 'Dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Export environment
        uses: cardinalby/export-env-action@v2
        with:
          envFile: .github/configs/${{ inputs.environment || 'Dev' }}.env

      - uses: ./.github/actions/setup-intent-capture
        with:
          aws_role_arn: ${{ env.AWS_OIDC_ROLE }}
          aws_region: ${{ env.AWS_REGION }}
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - uses: ./.github/actions/terraform-run
        with:
          action: apply
          backend_config: environments/dev.backend.hcl
          var_file: environments/dev.tfvars

  deploy-service:
    name: Deploy ECS Service
    runs-on: ubuntu-24.04
    needs: [build-and-push, terraform]
    environment: ${{ inputs.environment || 'Dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Export environment
        uses: cardinalby/export-env-action@v2
        with:
          envFile: .github/configs/${{ inputs.environment || 'Dev' }}.env

      - uses: ./.github/actions/setup-intent-capture
        with:
          aws_role_arn: ${{ env.AWS_OIDC_ROLE }}
          aws_region: ${{ env.AWS_REGION }}
          terraform_version: ""

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-24.04
    needs: deploy-service
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Export environment
        uses: cardinalby/export-env-action@v2
        with:
          envFile: .github/configs/${{ inputs.environment || 'Dev' }}.env

      - uses: ./.github/actions/setup-intent-capture
        with:
          aws_role_arn: ${{ env.AWS_OIDC_ROLE }}
          aws_region: ${{ env.AWS_REGION }}
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Get service URL
        id: url
        working-directory: terraform
        run: |
          terraform init -input=false -backend-config=environments/dev.backend.hcl
          SERVICE_URL=$(terraform output -raw service_url 2>/dev/null || echo "")
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: pip install websockets httpx

      - name: Run smoke tests
        env:
          SERVICE_URL: ${{ steps.url.outputs.service_url }}
        run: bash .github/scripts/smoke-test.sh
