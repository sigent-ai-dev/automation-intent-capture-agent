<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Inca sun motif with stepped pyramid base -->
  <!-- Outer sun rays -->
  <g stroke="#D4A017" stroke-width="1.5" stroke-linecap="round">
    <line x1="16" y1="2" x2="16" y2="5"/>
    <line x1="16" y1="27" x2="16" y2="30"/>
    <line x1="2" y1="16" x2="5" y2="16"/>
    <line x1="27" y1="16" x2="30" y2="16"/>
    <line x1="6.1" y1="6.1" x2="8.2" y2="8.2"/>
    <line x1="23.8" y1="23.8" x2="25.9" y2="25.9"/>
    <line x1="6.1" y1="25.9" x2="8.2" y2="23.8"/>
    <line x1="23.8" y1="8.2" x2="25.9" y2="6.1"/>
  </g>
  <!-- Central sun circle -->
  <circle cx="16" cy="16" r="7" fill="#D4A017"/>
  <!-- Inner stepped diamond (Inca textile pattern) -->
  <path d="M16 11 L19 14 L19 18 L16 21 L13 18 L13 14 Z" fill="#1a1a2e"/>
  <!-- Stepped accents -->
  <rect x="14.5" y="13" width="3" height="2" fill="#C84B31"/>
  <rect x="14.5" y="17" width="3" height="2" fill="#C84B31"/>
</svg>
